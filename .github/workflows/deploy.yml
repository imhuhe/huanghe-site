name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: netlify-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Debug — verify token identity
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          echo "Token length (chars):"
          printf '%s' "$NETLIFY_AUTH_TOKEN" | wc -c
          echo "Site ID:"
          echo "$NETLIFY_SITE_ID"
          echo "--- /user ---"
          curl -sS -o /tmp/user.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            https://api.netlify.com/api/v1/user
          cat /tmp/user.json | head -c 400 ; echo
          echo "--- /sites/<id> ---"
          curl -sS -o /tmp/site.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID"
          cat /tmp/site.json | head -c 400 ; echo

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          npx --yes netlify-cli@latest deploy \
            --prod \
            --dir=dist \
            --site="$NETLIFY_SITE_ID" \
            --message="GHA ${COMMIT_SHA}"
